name: Refresh booking slots

# Runs on GitHub's infrastructure — independent of any local machine.
# Schedule: daily at 22:00 UTC = 6 PM EDT (5 PM EST in winter). Daily refresh
# keeps the picker rolling forward so it never shows past dates. We only offer
# the next 2 business days (--days 2): a short booking horizon minimizes
# no-shows and cancellations; the daily run keeps that 2-day window current.
# Also runnable on-demand from the Actions tab via the "Run workflow" button.

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

# Allow the workflow to push refreshed booking-slots.json back to main.
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth google-auth-oauthlib

      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Refresh slots
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python scripts/update-booking-slots.py --auto-deploy --days 2
