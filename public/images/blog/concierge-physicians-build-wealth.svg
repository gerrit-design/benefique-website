<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064E3B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#065F46;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg5)"/>
  <!-- Accent -->
  <rect x="0" y="0" width="1200" height="4" fill="#10B981"/>
  <rect x="1192" y="0" width="8" height="630" fill="#10B981" opacity="0.4"/>
  <circle cx="1000" cy="500" r="220" fill="#10B981" opacity="0.04"/>
  <circle cx="200" cy="100" r="130" fill="#10B981" opacity="0.04"/>
  <!-- Wealth growth chart -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="280" height="400" rx="16" fill="#FFFFFF" opacity="0.06"/>
    <!-- Y-axis labels -->
    <text x="35" y="65" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">$25M</text>
    <text x="35" y="130" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">$15M</text>
    <text x="35" y="205" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">$8M</text>
    <text x="35" y="280" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="end">$3M</text>
    <text x="35" y="340" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="end" opacity="0.4">$0</text>
    <!-- Grid lines -->
    <line x1="45" y1="60" x2="260" y2="60" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
    <line x1="45" y1="125" x2="260" y2="125" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
    <line x1="45" y1="200" x2="260" y2="200" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
    <line x1="45" y1="275" x2="260" y2="275" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
    <line x1="45" y1="335" x2="260" y2="335" stroke="#FFFFFF" stroke-width="1" opacity="0.1"/>
    <!-- Growth curve - exponential -->
    <path d="M55,330 C80,325 100,310 120,290 C140,265 155,230 170,195 C190,150 210,110 230,75 L250,45" stroke="#10B981" stroke-width="3.5" fill="none"/>
    <!-- Area under curve -->
    <path d="M55,330 C80,325 100,310 120,290 C140,265 155,230 170,195 C190,150 210,110 230,75 L250,45 L250,335 L55,335 Z" fill="#10B981" opacity="0.08"/>
    <!-- Data points -->
    <circle cx="90" cy="315" r="5" fill="#10B981"/>
    <circle cx="130" cy="280" r="5" fill="#10B981"/>
    <circle cx="170" cy="195" r="5" fill="#10B981"/>
    <circle cx="210" cy="110" r="5" fill="#10B981"/>
    <circle cx="250" cy="45" r="7" fill="#10B981" stroke="#FFFFFF" stroke-width="2"/>
    <!-- X labels -->
    <text x="90" y="360" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.4">Yr 5</text>
    <text x="130" y="360" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.4">Yr 10</text>
    <text x="170" y="360" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.4">Yr 15</text>
    <text x="210" y="360" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" opacity="0.4">Yr 20</text>
    <text x="250" y="360" font-family="Arial, sans-serif" font-size="10" fill="#10B981" text-anchor="middle">Yr 25</text>
    <!-- 5 pillars mini icons -->
    <rect x="45" y="375" width="40" height="16" rx="4" fill="#10B981" opacity="0.3"/>
    <rect x="90" y="375" width="40" height="16" rx="4" fill="#10B981" opacity="0.25"/>
    <rect x="135" y="375" width="40" height="16" rx="4" fill="#10B981" opacity="0.2"/>
    <rect x="180" y="375" width="40" height="16" rx="4" fill="#10B981" opacity="0.15"/>
    <rect x="225" y="375" width="40" height="16" rx="4" fill="#10B981" opacity="0.1"/>
    <text x="140" y="395" font-family="Arial, sans-serif" font-size="9" fill="#10B981" text-anchor="middle" opacity="0.7">5 WEALTH PILLARS</text>
  </g>
  <!-- Text -->
  <text x="410" y="210" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#FFFFFF">Build Wealth</text>
  <text x="410" y="275" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#10B981">Beyond Your</text>
  <text x="410" y="340" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#10B981">Practice</text>
  <text x="410" y="400" font-family="Arial, sans-serif" font-size="24" fill="#8BBFAA">5-pillar wealth framework</text>
  <text x="410" y="433" font-family="Arial, sans-serif" font-size="24" fill="#8BBFAA">for concierge physicians</text>
  <!-- Branding -->
  <text x="410" y="540" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#10B981">BENEFIQUE TAX &amp; ACCOUNTING</text>
  <text x="410" y="565" font-family="Arial, sans-serif" font-size="14" fill="#8BBFAA">Davie, FL | Broward County</text>
</svg>