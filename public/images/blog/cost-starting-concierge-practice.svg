    <rect x="30" y="130" width="22" height="22" rx="4" fill="#2DD4A8" opacity="0.7"/>
    <text x="41" y="147" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle">&#10003;</text>
