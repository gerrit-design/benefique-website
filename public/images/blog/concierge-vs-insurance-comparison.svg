<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3L" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg3L)"/>
  <!-- Split design - diagonal -->
  <polygon points="0,630 600,0 650,0 50,630" fill="#FF6B35" opacity="0.06"/>
  <polygon points="50,630 650,0 700,0 100,630" fill="#FF6B35" opacity="0.04"/>
  <!-- Left side - Insurance (muted) -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="200" height="320" rx="14" fill="#FFFFFF" opacity="0.06"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.4">INSURANCE</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#FFFFFF" stroke-width="1" opacity="0.1"/>
    <text x="100" y="85" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.3">2,500 patients</text>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.3">7 min/visit</text>
    <text x="100" y="155" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.3">65% overhead</text>
    <text x="100" y="190" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.3">30-90 day AR</text>
    <rect x="30" y="220" width="140" height="45" rx="8" fill="#FFFFFF" opacity="0.06"/>
    <text x="100" y="240" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF" text-anchor="middle" opacity="0.3">NET INCOME</text>
    <text x="100" y="258" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF" text-anchor="middle" opacity="0.4">$280K</text>
    <!-- X mark -->
    <text x="100" y="305" font-family="Arial, sans-serif" font-size="28" fill="#FF4444" text-anchor="middle" opacity="0.4">&#10007;</text>
  </g>
  <!-- Center VS badge -->
  <circle cx="335" cy="315" r="30" fill="#FF6B35" opacity="0.9"/>
  <text x="335" y="323" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF" text-anchor="middle">VS</text>
  <!-- Right side - Concierge (highlighted) -->
  <g transform="translate(390, 140)">
    <rect x="0" y="0" width="200" height="320" rx="14" fill="#FF6B35" opacity="0.12"/>
    <rect x="0" y="0" width="200" height="320" rx="14" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.3"/>
    <text x="100" y="35" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF6B35" text-anchor="middle">CONCIERGE</text>
    <line x1="20" y1="50" x2="180" y2="50" stroke="#FF6B35" stroke-width="1" opacity="0.2"/>
    <text x="100" y="85" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.8">300 patients</text>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.8">45 min/visit</text>
    <text x="100" y="155" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.8">45% overhead</text>
    <text x="100" y="190" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle" opacity="0.8">Prepaid</text>
    <rect x="30" y="220" width="140" height="45" rx="8" fill="#FF6B35" opacity="0.2"/>
    <text x="100" y="240" font-family="Arial, sans-serif" font-size="11" fill="#FF6B35" text-anchor="middle">NET INCOME</text>
    <text x="100" y="258" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF6B35" text-anchor="middle">$800K+</text>
    <!-- Check mark -->
    <text x="100" y="305" font-family="Arial, sans-serif" font-size="28" fill="#2DD4A8" text-anchor="middle">&#10003;</text>
  </g>
  <!-- Text -->
  <text x="660" y="220" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#FFFFFF">Financial</text>
  <text x="660" y="280" font-family="Georgia, serif" font-size="46" font-weight="bold" fill="#FF6B35">Comparison</text>
  <text x="660" y="340" font-family="Arial, sans-serif" font-size="22" fill="#8B9DC3">Insurance vs Concierge vs DPC</text>
  <text x="660" y="373" font-family="Arial, sans-serif" font-size="22" fill="#8B9DC3">Side-by-side analysis</text>
  <!-- Branding -->
  <text x="660" y="540" font-family="Arial, sans-serif" font-size="18" font-weight="600" fill="#FF6B35">BENEFIQUE TAX &amp; ACCOUNTING</text>
  <text x="660" y="565" font-family="Arial, sans-serif" font-size="14" fill="#8B9DC3">Davie, FL | Broward County</text>
</svg>