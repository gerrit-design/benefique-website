<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="The 1-D, 2-D, 3-D way to read every scan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B365D"/>
      <stop offset="1" stop-color="#0F1F38"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="80" y="120" font-family="Georgia, serif" font-size="30" fill="#F97316" font-weight="700">BENEFIQUE INTELLIGENCE</text>
  <text x="80" y="210" font-family="Georgia, serif" font-size="58" fill="#ffffff" font-weight="700">The radiology P&amp;L</text>
  <text x="80" y="278" font-family="Georgia, serif" font-size="58" fill="#ffffff" font-weight="700">lies to you.</text>
  <text x="80" y="340" font-family="Arial, sans-serif" font-size="26" fill="#9DB2CE">The 1-D / 2-D / 3-D way to read every scan</text>

  <!-- three dimension cards -->
  <g font-family="Arial, sans-serif">
    <rect x="80" y="400" width="320" height="150" rx="12" fill="#ffffff" opacity="0.06"/>
    <text x="110" y="450" font-size="40" fill="#F97316" font-weight="700">1-D</text>
    <text x="110" y="490" font-size="22" fill="#ffffff">Cost per scan</text>
    <text x="110" y="522" font-size="18" fill="#9DB2CE">$253 — the wrong number</text>

    <rect x="440" y="400" width="320" height="150" rx="12" fill="#ffffff" opacity="0.10"/>
    <text x="470" y="450" font-size="40" fill="#10B981" font-weight="700">2-D</text>
    <text x="470" y="490" font-size="22" fill="#ffffff">Contribution margin</text>
    <text x="470" y="522" font-size="18" fill="#9DB2CE">$116 — the real floor</text>

    <rect x="800" y="400" width="320" height="150" rx="12" fill="#ffffff" opacity="0.06"/>
    <text x="830" y="450" font-size="40" fill="#60A5FA" font-weight="700">3-D</text>
    <text x="830" y="490" font-size="22" fill="#ffffff">Cash timing</text>
    <text x="830" y="522" font-size="18" fill="#9DB2CE">30 days vs 400 days</text>
  </g>
</svg>
